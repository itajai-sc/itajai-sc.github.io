<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Negócios e Notícias Locais | Portal Itajaí</title>
    <meta name="description" content="Acompanhe o arquivo completo de notícias sobre economia, mercado local, desenvolvimento e empresas na região de Itajaí - SC.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- BANCO DE DADOS COMPARTILHADO DE NOTÍCIAS -->
    <script>
        const LISTA_DE_NOTICIAS = [
            {
                tag: "Tendências",
                titulo: "Como o SEO Local está transformando o comércio de bairro em Santa Catarina",
                data: "Junho, 2026",
                link: "/noticias/seo-local-sc.html"
            },
            {
                tag: "Destaque Regional",
                titulo: "A Importância do Jornalismo Regional e da Mídia Local no Vale do Itajaí",
                data: "Junho, 2026",
                link: "/noticias/vale-do-itajai.html"
            }
        ];
    </script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-lg">I-SC</div>
                <div>
                    <a href="/" class="text-lg font-bold text-gray-900 block hover:text-blue-600">Portal Itajaí</a>
                </div>
            </div>
            <nav class="flex gap-4 text-sm font-semibold text-gray-600">
                <a href="/" class="hover:text-blue-600">Início</a>
                <a href="/#empresas" class="hover:text-blue-600">Empresas</a>
                <a href="/noticias/" class="text-blue-600">Notícias</a>
            </nav>
        </div>
    </header>

    <!-- TÍTULO DA SEÇÃO -->
    <main class="max-w-4xl mx-auto px-4 py-12 flex-grow w-full">
        <div class="border-b border-gray-200 pb-4 mb-8">
            <span class="text-xs font-bold text-blue-600 uppercase tracking-widest">Cluster de Conteúdo</span>
            <h1 class="text-3xl font-extrabold text-gray-900 mt-1">Radar de Negócios Locais</h1>
            <p class="text-gray-500 mt-2 font-light">Artigos, análises e insights sobre o desenvolvimento comercial de Itajaí.</p>
        </div>

        <!-- FEED AUTOMÁTICO -->
        <div class="bg-white rounded-xl border border-gray-200 divide-y divide-gray-100 shadow-xs" id="feed-noticias"></div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t border-gray-200 py-6 mt-auto text-center text-sm text-gray-500">
        <p>&copy; 2026 Portal Itajaí-SC. Otimização de SEO Local.</p>
    </footer>

    <!-- ENGINE DE PREENCHIMENTO AUTOMÁTICO -->
    <script>
        const container = document.getElementById('feed-noticias');
        container.innerHTML = LISTA_DE_NOTICIAS.map(noticia => `
            <article class="p-6 hover:bg-gray-50/50 transition">
                <span class="text-[10px] font-bold uppercase tracking-wider ${noticia.corTag} px-2 py-0.5 rounded-sm">${noticia.tag}</span>
                <h2 class="text-xl font-bold text-gray-900 mt-3 leading-snug hover:text-blue-600 transition">
                    <a href="${noticia.link}">${noticia.titulo}</a>
                </h2>
                <p class="text-gray-500 text-sm mt-2 font-light">${noticia.descricao}</p>
                <p class="text-xs text-gray-400 mt-4">Publicado em ${noticia.data}</p>
            </article>
        `).join('');
    </script>
</body>
</html>
